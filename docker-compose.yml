services:
  postgres:
    image: postgres:16-alpine
    container_name: media-pipeline-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: media-pipeline-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    container_name: media-pipeline-api
    restart: unless-stopped
    env_file:
      - ./api/.env
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  # FIX 1: ml is now a proper sibling service (correct indentation)
  ml:
    build:
      context: ./ml
    container_name: media-pipeline-ml
    restart: unless-stopped
    environment:
      # FIX 2: pulled from root .env via Compose interpolation
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY}

  worker:
    build:
      context: ./worker
    container_name: media-pipeline-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml:5000
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY}
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  redis_data:
  uploads_data: